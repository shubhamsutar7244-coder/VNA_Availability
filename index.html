<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VNA Cooler Room Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <script src="config.js"></script>
    <style>
      :root {
        --bg-top: #0b1726;
        --bg-mid: #0f2942;
        --bg-bottom: #12314d;
        --panel: rgba(255, 255, 255, 0.92);
        --text-main: #12263a;
        --text-muted: #4f6478;
        --filled: #0f9d8a;
        --empty: #e9eef3;
        --empty-border: #bcc9d6;
        --warning: #d27831;
        --danger: #c0392b;
        --shadow: 0 18px 50px rgba(4, 21, 36, 0.24);
        --radius: 18px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text-main);
        background: radial-gradient(circle at 20% 20%, #1b4868 0%, transparent 42%),
          linear-gradient(160deg, var(--bg-top), var(--bg-mid) 45%, var(--bg-bottom));
        display: flex;
        justify-content: center;
        padding: 24px;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .background-grid {
        position: fixed; inset: 0; pointer-events: none;
        background-image: linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at 50% 20%, black 30%, transparent 90%);
      }

      .dashboard {
        width: min(1320px, 100%);
        background: var(--panel);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
        padding: 28px;
        animation: reveal 700ms ease;
      }

      /* ── Header ──────────────────────────────────── */
      .topbar {
        display: flex; gap: 20px;
        justify-content: space-between; align-items: flex-start;
        margin-bottom: 22px;
      }
      .eyebrow {
        margin: 0; font-size: .82rem; letter-spacing: .12em;
        text-transform: uppercase; color: var(--warning); font-weight: 700;
      }
      h1 { margin: 4px 0 0; font-size: clamp(1.5rem, 2.4vw, 2rem); }
      .subtitle { margin: 6px 0 0; color: var(--text-muted); }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }

      button {
        border: 1px solid #1f4b6c; background: #fff; color: #1f4b6c;
        padding: 10px 14px; border-radius: 10px; font-weight: 700;
        font-family: inherit; cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(12,41,63,.16);
      }
      button:active { transform: translateY(0); }
      button.primary {
        background: #1f4b6c; color: #fff;
      }
      button.danger {
        border-color: var(--danger); color: var(--danger);
      }

      /* ── Stats Row ───────────────────────────────── */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px; margin-bottom: 20px;
      }
      .stat-card {
        border-radius: var(--radius); padding: 14px 16px;
        background: #f4f8fb; border: 1px solid #d5e1ec;
      }
      .stat-card p { margin: 0; color: var(--text-muted); font-size: .88rem; }
      .stat-card strong {
        margin-top: 4px; display: block;
        font-family: "IBM Plex Mono", monospace; font-size: 1.5rem;
      }
      .stat-card.filled  { border-color: #91d8ce; background: #e7f8f5; }
      .stat-card.empty    { border-color: #c8d5e2; background: #f2f6fa; }
      .stat-card.util     { border-color: #e6c9b0; background: #fff4ea; }
      .stat-card.vna-stat { border-color: #b0c4de; background: #eef3fa; }

      /* ── Section titles ──────────────────────────── */
      .section-title {
        font-size: 1.1rem; font-weight: 700;
        margin: 24px 0 12px; color: var(--text-main);
      }

      /* ── Legend ───────────────────────────────────── */
      .legend {
        display: flex; flex-wrap: wrap; align-items: center;
        gap: 14px; color: var(--text-muted); margin-bottom: 16px;
      }
      .dot {
        width: 11px; height: 11px; border-radius: 50%;
        display: inline-block; margin-right: 6px;
      }
      .dot.is-filled { background: var(--filled); }
      .dot.is-empty  { background: var(--empty); border: 1px solid var(--empty-border); }

      /* ── VNA Tabs ─────────────────────────────────── */
      .vna-tabs {
        display: flex; gap: 6px; margin-bottom: 12px;
      }
      .vna-tab {
        padding: 8px 18px; border-radius: 10px 10px 0 0;
        font-weight: 700; cursor: pointer; border: 1px solid #d4e0eb;
        border-bottom: none; background: #eef4f9; color: var(--text-muted);
        font-family: inherit; font-size: .92rem;
      }
      .vna-tab.active {
        background: #fff; color: var(--text-main);
        border-color: #1f4b6c;
      }

      /* ── VNA Grid ─────────────────────────────────── */
      .vna-grid-wrap {
        border: 1px solid #d4e0eb;
        background: linear-gradient(180deg, #f8fbfd, #eef4f9);
        border-radius: 0 16px 16px 16px; padding: 16px;
        overflow-x: auto; margin-bottom: 20px;
      }
      .vna-grid-container { display: none; }
      .vna-grid-container.active { display: block; }

      .vna-room {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px; align-items: start;
      }
      .vna-side-label {
        text-align: center; font-weight: 700;
        font-size: .85rem; color: #33556f;
        padding: 6px 0; text-transform: uppercase;
        letter-spacing: .08em;
      }
      .vna-aisle {
        width: 40px; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        min-height: 200px; position: relative;
      }
      .vna-aisle::before {
        content: ''; position: absolute; top: 30px; bottom: 30px;
        width: 2px; background: repeating-linear-gradient(
          180deg, #c5d3e1 0, #c5d3e1 8px, transparent 8px, transparent 16px
        );
      }
      .vna-aisle-label {
        writing-mode: vertical-rl; text-orientation: mixed;
        font-size: .72rem; color: #8ea5b8; font-weight: 600;
        letter-spacing: .1em; text-transform: uppercase;
        background: #f8fbfd; padding: 4px 2px; z-index: 1;
      }
      .vna-door {
        text-align: center; margin-top: 8px;
        font-size: .75rem; color: #8ea5b8; font-weight: 600;
      }
      .vna-door::before { content: '🚪 '; }

      .vna-rack-map {
        display: grid; gap: 6px;
      }
      .vna-col-headers, .vna-rack-row {
        display: grid; gap: 6px;
      }
      .vna-header-cell {
        display: grid; place-items: center;
        font-family: "IBM Plex Mono", monospace; font-weight: 600;
        color: #33556f; font-size: .78rem;
        border: 1px solid #c5d3e1; border-radius: 6px;
        background: #e7eff6; padding: 4px;
      }
      .vna-cell {
        width: 100%; min-height: 38px;
        border: 1px solid var(--empty-border);
        background: var(--empty);
        border-radius: 6px; cursor: default;
        display: flex; align-items: center; justify-content: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: .68rem; color: var(--text-muted);
        transition: background 200ms, border-color 200ms;
        position: relative;
        padding: 4px 2px;
      }
      .vna-cell-label {
        font-size: .62rem; font-weight: 600;
        line-height: 1.1; text-align: center;
        word-break: break-all;
      }
      .vna-cell.is-filled {
        background: linear-gradient(180deg, #d4f3ee, #b8ebe1);
        border-color: #63bfaf; color: #0e6659; font-weight: 600;
      }
      .vna-cell .tooltip {
        display: none; position: absolute; bottom: calc(100% + 6px);
        left: 50%; transform: translateX(-50%);
        background: #12263a; color: #fff; padding: 6px 10px;
        border-radius: 8px; font-size: .75rem; white-space: nowrap;
        z-index: 10; pointer-events: none;
      }
      .vna-cell:hover .tooltip { display: block; }

      /* ── Toast ────────────────────────────────────── */
      .toast-container {
        position: fixed; top: 20px; right: 20px; z-index: 1000;
        display: flex; flex-direction: column; gap: 8px;
      }
      .toast {
        padding: 12px 18px; border-radius: 10px;
        font-family: inherit; font-size: .88rem;
        font-weight: 600; color: #fff;
        animation: slideIn 300ms ease;
        box-shadow: 0 6px 20px rgba(0,0,0,.2);
      }
      .toast.success { background: #0f9d8a; }
      .toast.error   { background: #c0392b; }
      .toast.info    { background: #2c6faa; }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(40px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes reveal {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 800px) {
        body { padding: 14px; }
        .dashboard { padding: 16px; }
        .topbar { flex-direction: column; align-items: stretch; }
        .stats { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>

  <body>
    <div class="background-grid" aria-hidden="true"></div>
    <div class="toast-container" id="toastContainer"></div>

    <main class="dashboard">
      <!-- ── Header ─────────────────────────────────── -->
      <header class="topbar">
        <div>
          <p class="eyebrow">Air Cargo Operations</p>
          <h1>VNA Cooler Room Monitor</h1>
          <p class="subtitle">Real-time tracking of 320 cooler locations across 3 VNA units</p>
        </div>
        <div class="actions">
          <button id="simulateBtn" type="button" class="primary">Simulate FPS</button>
          <button id="resetBtn" type="button" class="danger">Reset All</button>
        </div>
      </header>

      <!-- ── Stats ──────────────────────────────────── -->
      <section class="stats" aria-label="Occupancy summary">
        <article class="stat-card filled">
          <p>Occupied</p>
          <strong id="occupiedCount">0</strong>
        </article>
        <article class="stat-card empty">
          <p>Available</p>
          <strong id="availableCount">320</strong>
        </article>
        <article class="stat-card util">
          <p>Utilization</p>
          <strong id="utilization">0%</strong>
        </article>
      </section>

      <!-- ── Legend ─────────────────────────────────── -->
      <section class="legend">
        <span><i class="dot is-filled"></i> Occupied</span>
        <span><i class="dot is-empty"></i> Empty</span>
      </section>

      <!-- ── VNA Rack Grids ─────────────────────────── -->
      <h2 class="section-title">VNA Rack Layouts</h2>
      <div class="vna-tabs" id="vnaTabs"></div>
      <div class="vna-grid-wrap" id="vnaGridWrap"></div>
    </main>

    <script>
      /* ═══════════════════════════════════════════════
         STATE
         ═══════════════════════════════════════════════ */
      const occupiedLocations = new Map();
      const API_BASE = window.location.origin;

      /* ═══════════════════════════════════════════════
         DASHBOARD UPDATE
         ═══════════════════════════════════════════════ */
      function updateDashboard() {
        const totalOccupied = occupiedLocations.size;
        const totalAvailable = CONFIG.totalCapacity - totalOccupied;
        const utilPct = Math.round((totalOccupied / CONFIG.totalCapacity) * 100);

        document.getElementById("occupiedCount").textContent = totalOccupied;
        document.getElementById("availableCount").textContent = totalAvailable;
        document.getElementById("utilization").textContent = utilPct + "%";

        updateVnaGrids();
      }

      // Apply full snapshot from the API server
      function applyServerSnapshot(snap) {
        occupiedLocations.clear();
        if (snap.occupiedSlots) {
          for (var loc in snap.occupiedSlots) {
            occupiedLocations.set(loc, snap.occupiedSlots[loc]);
          }
        }
        updateDashboard();
      }

      /* ═══════════════════════════════════════════════
         SSE — Real-time updates from server
         ═══════════════════════════════════════════════ */
      let evtSource = null;

      function connectSSE() {
        if (evtSource) evtSource.close();
        evtSource = new EventSource(API_BASE + "/api/events");

        evtSource.addEventListener("snapshot", function (e) {
          applyServerSnapshot(JSON.parse(e.data));
        });
        evtSource.addEventListener("status", function (e) {
          applyServerSnapshot(JSON.parse(e.data));
        });
        evtSource.addEventListener("reset", function (e) {
          applyServerSnapshot(JSON.parse(e.data));
        });
        evtSource.onerror = function () {
          evtSource.close();
          setTimeout(connectSSE, 5000);
        };
      }

      /* ═══════════════════════════════════════════════
         VNA GRID RENDERING
         ═══════════════════════════════════════════════ */
      function buildSideGrid(vna, vnaNum, side) {
        var wrapper = document.createElement("div");

        var sideLabel = document.createElement("div");
        sideLabel.className = "vna-side-label";
        sideLabel.textContent = (side === "L" ? "\u2190 Left Rack" : "Right Rack \u2192");
        wrapper.appendChild(sideLabel);

        var numCols = vna.columns;
        var gridCols = "44px repeat(" + numCols + ", minmax(72px, 1fr))";

        var headerRow = document.createElement("div");
        headerRow.className = "vna-col-headers";
        headerRow.style.display = "grid";
        headerRow.style.gridTemplateColumns = gridCols;
        headerRow.style.gap = "6px";

        var corner = document.createElement("div");
        corner.className = "vna-header-cell";
        corner.textContent = "ROW";
        headerRow.appendChild(corner);

        for (var c = 1; c <= numCols; c++) {
          var ch = document.createElement("div");
          ch.className = "vna-header-cell";
          ch.textContent = String(c).padStart(2, "0");
          headerRow.appendChild(ch);
        }
        wrapper.appendChild(headerRow);

        for (var r = 0; r < vna.rows; r++) {
          var rowLetter = String.fromCharCode(65 + r);
          var row = document.createElement("div");
          row.className = "vna-rack-row";
          row.style.display = "grid";
          row.style.gridTemplateColumns = gridCols;
          row.style.gap = "6px";

          var rh = document.createElement("div");
          rh.className = "vna-header-cell";
          rh.textContent = rowLetter;
          row.appendChild(rh);

          for (var col = 1; col <= numCols; col++) {
            var locId = vnaNum + side + vna.sph + String(col).padStart(2, "0") + rowLetter;

            var cell = document.createElement("div");
            cell.className = "vna-cell";
            cell.id = "cell-" + locId;
            cell.dataset.loc = locId;

            var label = document.createElement("span");
            label.className = "vna-cell-label";
            label.textContent = locId;
            cell.appendChild(label);

            var tooltip = document.createElement("span");
            tooltip.className = "tooltip";
            tooltip.textContent = locId + " \u2014 Empty";
            cell.appendChild(tooltip);

            row.appendChild(cell);
          }
          wrapper.appendChild(row);
        }
        return wrapper;
      }

      function buildVnaGrids() {
        const tabsEl = document.getElementById("vnaTabs");
        const wrapEl = document.getElementById("vnaGridWrap");
        tabsEl.innerHTML = "";
        wrapEl.innerHTML = "";

        const vnaIds = Object.keys(CONFIG.vna);
        vnaIds.forEach(function (vnaId, idx) {
          var tab = document.createElement("button");
          tab.className = "vna-tab" + (idx === 0 ? " active" : "");
          tab.textContent = vnaId + " (" + CONFIG.vna[vnaId].sph + ")";
          tab.type = "button";
          tab.dataset.vna = vnaId;
          tab.addEventListener("click", function () {
            document.querySelectorAll(".vna-tab").forEach(function (t) { t.classList.remove("active"); });
            tab.classList.add("active");
            document.querySelectorAll(".vna-grid-container").forEach(function (c) { c.classList.remove("active"); });
            document.getElementById("grid-" + vnaId).classList.add("active");
          });
          tabsEl.appendChild(tab);

          var container = document.createElement("div");
          container.className = "vna-grid-container" + (idx === 0 ? " active" : "");
          container.id = "grid-" + vnaId;

          var vna = CONFIG.vna[vnaId];
          var vnaNum = vnaId.replace("VNA0", "");

          var room = document.createElement("div");
          room.className = "vna-room";
          room.appendChild(buildSideGrid(vna, vnaNum, "L"));

          var aisle = document.createElement("div");
          aisle.className = "vna-aisle";
          var aisleLabel = document.createElement("span");
          aisleLabel.className = "vna-aisle-label";
          aisleLabel.textContent = "Aisle";
          aisle.appendChild(aisleLabel);
          room.appendChild(aisle);

          room.appendChild(buildSideGrid(vna, vnaNum, "R"));
          container.appendChild(room);

          var door = document.createElement("div");
          door.className = "vna-door";
          door.textContent = "Entry Door";
          container.appendChild(door);

          wrapEl.appendChild(container);
        });
      }

      function updateVnaGrids() {
        document.querySelectorAll(".vna-cell").forEach(function (cell) {
          var locId = cell.dataset.loc;
          var info = occupiedLocations.get(locId);
          if (info) {
            cell.classList.add("is-filled");
            cell.querySelector(".tooltip").textContent =
              locId + " \u2014 " + info.awbNumber + " [" + (info.sph || "") + "]";
          } else {
            cell.classList.remove("is-filled");
            cell.querySelector(".tooltip").textContent = locId + " \u2014 Empty";
          }
        });
      }

      /* ═══════════════════════════════════════════════
         TOAST
         ═══════════════════════════════════════════════ */
      function showToast(message, type) {
        var container = document.getElementById("toastContainer");
        var toast = document.createElement("div");
        toast.className = "toast " + (type || "info");
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function () {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 300ms";
          setTimeout(function () { toast.remove(); }, 300);
        }, 3500);
      }

      /* ═══════════════════════════════════════════════
         EVENT HANDLERS
         ═══════════════════════════════════════════════ */
      document.getElementById("simulateBtn").addEventListener("click", function () {
        fetch(API_BASE + "/api/fps", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            fromLocation: CONFIG.dropLocations[Math.floor(Math.random() * CONFIG.dropLocations.length)],
            toLocation: CONFIG.vnaLocations[Object.keys(CONFIG.vna)[Math.floor(Math.random() * 3)]][Math.floor(Math.random() * 50)],
            awbNumber: "014-" + String(Math.floor(10000000 + Math.random() * 89999999)),
            sph: "COL",
            pieces: Math.floor(1 + Math.random() * 5),
            weight: Math.round(5 + Math.random() * 95),
          }),
        }).then(function (r) { return r.json(); }).then(function (data) {
          if (data.error) showToast(data.error, "error");
          else applyServerSnapshot(data.snapshot);
        }).catch(function () { showToast("Server unavailable", "error"); });
      });

      document.getElementById("resetBtn").addEventListener("click", function () {
        fetch(API_BASE + "/api/reset", { method: "POST" })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            applyServerSnapshot(data.snapshot);
            showToast("All data reset.", "info");
          })
          .catch(function () {
            occupiedLocations.clear();
            updateDashboard();
            showToast("Reset locally.", "info");
          });
      });

      /* ═══════════════════════════════════════════════
         INIT
         ═══════════════════════════════════════════════ */
      buildVnaGrids();
      updateDashboard();
      connectSSE();
    </script>
  </body>
</html>
